<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        input, button {
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        li {
            background: #1e293b;
            margin: 10px auto;
            padding: 10px;
            width: 300px;
            border-radius: 8px;
        }

        a {
            margin-left: 10px;
        }
    </style>
</head>
<body>

<h1>🚀 My Task Manager</h1>

<form method="POST">
    <input type="text" name="task" required>
    <button type="submit">Add</button>
</form>

<ul>
    {% for task in tasks %}
        <li>
            {{ task[1] }}
            <a href="/edit/{{ task[0] }}">✏️</a>
            <a href="/delete/{{ task[0] }}">❌</a>
        </li>
    {% endfor %}
</ul>

</body>
</html>
